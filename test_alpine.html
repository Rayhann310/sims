<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="{ parent: true }">
    <div x-data="{ childOpen: false, url: '' }" @test-event.window="childOpen = true; url = $event.detail.url">
        <p x-show="childOpen">Child is Open with URL: <span x-text="url"></span></p>
        <button @click="$dispatch('test-event', { url: 'hello' })">Click Me</button>
    </div>
</body>
</html>
